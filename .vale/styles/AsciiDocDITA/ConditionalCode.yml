# Report conditional directives.
#
# Lists all ifdef, ifndef, and ifeval conditional statements in the file. Use
# this information to decide which attribute definitions to supply during
# conversion.
---
extends: existence
message: "%s"
level: suggestion
link: https://github.com/jhradilek/asciidoctor-dita-vale/blob/main/README.md#suggestions
scope: raw
nonword: true
tokens:
  - '^(?:ifn?def|ifeval)::\S*\[.*\][ \t]*$'
