# Report include directives.
#
# Lists all include directives in the file. Use this information to decide if
# include directives should be processed during conversion.
---
extends: existence
message: "%s"
level: suggestion
link: https://github.com/jhradilek/asciidoctor-dita-vale/blob/main/README.md#suggestions
scope: raw
nonword: true
tokens:
  - '^include::(?:[^\s\[]|[^[]*[^\s\[])\[.*\][ \t]*$'
