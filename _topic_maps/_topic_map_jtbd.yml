# This is a POC for mapping JTBD jobs
# Currently includes the category as the top-level item

# Updates:
#   - Pulled in all module inclusions from all necessary assemblies
#   - Bumped leveloffsets
#   - Removed unnecessary metadata
#   - [TODO] Fix any xrefs at the wrong level
#   - [TODO] Move the included assembly titles and short descriptions into their own concept modules (so that Vale checks pass)
#   - [TODO] Update module titles to use imperatives instead of gerunds
#   - [TODO] Update the job's abstract (right now it's just the job statement temporarily) and consider any additional glue/info/gaps
#   - [TODO] Run vale to make these DITA compliant (since we're combining some assemblies, things might fail Vale again even if it was already CQA'd)
#
# Caveats/questions
#   - Including the product category means we'll have to move source files to move it to a different category
#     - If we don't include the product category, we'd have all top jobs as top level directories, which could get unwieldy
#   - Top jobs as folders means that we can't have an .adoc file with details about the job - we'd have to figure out where to put that.
#     - I don't see a way to make it work with a file and directory with secondary jobs - investigate whether nested assemblies could help solve that or not
#     - Could potentially put the entire job as an assembly as a workaround, but that could be too much in one file (and bad for OKD/netlify preview)
#     - Could have a index-like landing page with the job information that would get transformed to the top job content. Not sure what this should actually look like on the portal
---
# Product category
Name: Optimize
Dir: optimize
Distros: openshift-jtbd
Topics:
# Top job
- Name: Optimize workload placement
  # Can't have both a file/contents and directory
  # File: optimize-workload-placement
  Dir: optimize_workload_placement
  Topics:
  # Secondary jobs
  - Name: Ensure high availability by spreading pods
    File: spread-pods
  - Name: Improve performance by grouping pods together
    File: group-pods
  - Name: Manage resource utilization by adjusting node density
    File: node-density
  - Name: Match workloads to specific nodes by using node constraints
    File: match-workloads
  - Name: Maintain cluster balance by rescheduling pods
    File: reschedule-pods
  - Name: Extend scheduling behavior with a secondary scheduler
    File: secondary-scheduler
