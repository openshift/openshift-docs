# Example Telecom Grandmaster PtpConfig for Intel Granite Rapids-D (GNR-D).
#
# Note:  This example configuration should be customized to match the desired
# configuration For this GNR-D T-GM configuration, we support GNSS incoming to
# the onboard connection, and up to 24 Time Transmitter ports including any NAC
# ports and any additional Carter Flats ports.
apiVersion: ptp.openshift.io/v1
kind: PtpConfig
metadata:
  name: gnrd-tgm
  namespace: openshift-ptp
  annotations:
    ran.openshift.io/ztp-deploy-wave: "10"
spec:
  profile:
    - name: "grandmaster"
      ptp4lOpts: "-2 --summary_interval -4"
      phc2sysOpts: -r -u 0 -m -w -N 8 -R 16 -n 24 -s eno8703
      ptpSchedulingPolicy: SCHED_FIFO
      ptpSchedulingPriority: 10
      ptpSettings:
        logReduce: "true"
      plugins:
        e830:
          devices:
            - enp108s0f0
            - enp110s0f0
        e825:
          devices:
            - eno8703
          settings:
            LocalMaxHoldoverOffSet: 1500
            LocalHoldoverTimeout: 14400
            MaxInSpecOffset: 100
          ublxCmds:
            - args: #ubxtool -P 29.25 -z CFG-HW-ANT_CFG_VOLTCTRL,1
                - "-P"
                - "29.25"
                - "-z"
                - "CFG-HW-ANT_CFG_VOLTCTRL,1"
              reportOutput: false
            - args: #ubxtool -P 29.25 -e GPS
                - "-P"
                - "29.25"
                - "-e"
                - "GPS"
              reportOutput: false
            - args: #ubxtool -P 29.25 -d Galileo
                - "-P"
                - "29.25"
                - "-d"
                - "Galileo"
              reportOutput: false
            - args: #ubxtool -P 29.25 -d GLONASS
                - "-P"
                - "29.25"
                - "-d"
                - "GLONASS"
              reportOutput: false
            - args: #ubxtool -P 29.25 -d BeiDou
                - "-P"
                - "29.25"
                - "-d"
                - "BeiDou"
              reportOutput: false
            - args: #ubxtool -P 29.25 -d SBAS
                - "-P"
                - "29.25"
                - "-d"
                - "SBAS"
              reportOutput: false
            - args: #ubxtool -P 29.25 -t -w 5 -v 1 -e SURVEYIN,600,50000
                - "-P"
                - "29.25"
                - "-t"
                - "-w"
                - "5"
                - "-v"
                - "1"
                - "-e"
                - "SURVEYIN,600,50000"
              reportOutput: true
            - args: #ubxtool -P 29.25 -p MON-HW
                - "-P"
                - "29.25"
                - "-p"
                - "MON-HW"
              reportOutput: true
            - args: #ubxtool -P 29.25 -p CFG-MSG,1,38,300
                - "-P"
                - "29.25"
                - "-p"
                - "CFG-MSG,1,38,248"
              reportOutput: true    
      ts2phcOpts: "-m"
      ts2phcConf: |
        [nmea]
        ts2phc.master 1
        [global]
        use_syslog  0
        verbose 1
        logging_level 7
        ts2phc.pulsewidth 100000000
        ts2phc.nmea_serialport /dev/ttyACM0 
        [eno8703]
        ts2phc.extts_polarity rising
        ts2phc.extts_correction 0
        ts2phc.master  0
        ts2phc.channel 0
        ts2phc.pin_index 1
        # This should be one section per Carter Flats (e830) card:
        [enp108s0f0]
        ts2phc.extts_polarity rising
        ts2phc.extts_correction 0
        ts2phc.master 0
        ts2phc.channel 0
        ts2phc.pin_index 1
        [enp110s0f0]
        ts2phc.extts_polarity rising
        ts2phc.extts_correction 0
        ts2phc.master 0
        ts2phc.channel 0
        ts2phc.pin_index 1
      ptp4lConf: |
        # All TimeTransmitter ports should be outlined here with 'masterOnly 1'
        #[eno8303]
        # ** Host management interface
        [eno8403]
        masterOnly 1
        [eno8503]
        masterOnly 1
        [eno8603]
        masterOnly 1
        [eno8703]
        masterOnly 1
        [eno8803]
        masterOnly 1
        [eno8903]
        masterOnly 1
        [eno9003]
        masterOnly 1
        [enp108s0f0]
        masterOnly 1
        [enp108s0f1]
        masterOnly 1
        [enp108s0f2]
        masterOnly 1
        [enp108s0f3]
        masterOnly 1
        [enp108s0f4]
        masterOnly 1
        [enp108s0f5]
        masterOnly 1
        [enp108s0f6]
        masterOnly 1
        [enp108s0f7]
        masterOnly 1
        [enp110s0f0]
        masterOnly 1
        [enp110s0f1]
        masterOnly 1
        [enp110s0f2]
        masterOnly 1
        [enp110s0f3]
        masterOnly 1
        [enp110s0f4]
        masterOnly 1
        [enp110s0f5]
        masterOnly 1
        [enp110s0f6]
        masterOnly 1
        [enp110s0f7]
        masterOnly 1
        [global]
        #
        # Default Data Set
        #
        twoStepFlag 1
        priority1 128
        priority2 128
        domainNumber 24
        #utc_offset 37
        clockClass 6
        clockAccuracy 0x27
        offsetScaledLogVariance 0xFFFF
        free_running 0
        freq_est_interval 1
        dscp_event 0
        dscp_general 0
        dataset_comparison G.8275.x
        G.8275.defaultDS.localPriority 128
        #
        # Port Data Set
        #
        logAnnounceInterval -3
        logSyncInterval -4
        logMinDelayReqInterval -4
        logMinPdelayReqInterval 0
        announceReceiptTimeout 3
        syncReceiptTimeout 0
        delayAsymmetry 0
        fault_reset_interval 4
        neighborPropDelayThresh 20000000
        masterOnly 0
        G.8275.portDS.localPriority 128
        #
        # Run time options
        #
        assume_two_step 0
        logging_level 6
        path_trace_enabled 0
        follow_up_info 0
        hybrid_e2e 0
        inhibit_multicast_service 0
        net_sync_monitor 0
        tc_spanning_tree 0
        tx_timestamp_timeout 50
        unicast_listen 0
        unicast_master_table 0
        unicast_req_duration 3600
        use_syslog 1
        verbose 0
        summary_interval -4
        kernel_leap 1
        check_fup_sync 0
        #
        # Servo Options
        #
        pi_proportional_const 0.0
        pi_integral_const 0.0
        pi_proportional_scale 0.0
        pi_proportional_exponent -0.3
        pi_proportional_norm_max 0.7
        pi_integral_scale 0.0
        pi_integral_exponent 0.4
        pi_integral_norm_max 0.3
        step_threshold 0.0
        first_step_threshold 0.00002
        clock_servo pi
        sanity_freq_limit  200000000
        ntpshm_segment 0
        #
        # Transport options
        #
        transportSpecific 0x0
        ptp_dst_mac 01:1B:19:00:00:00
        p2p_dst_mac 01:80:C2:00:00:0E
        udp_ttl 1
        udp6_scope 0x0E
        uds_address /var/run/ptp4l
        #
        # Default interface options
        #
        clock_type BC
        network_transport L2
        delay_mechanism E2E
        time_stamping hardware
        tsproc_mode filter
        delay_filter moving_median
        delay_filter_length 10
        egressLatency 0
        ingressLatency 0
        boundary_clock_jbod 1
        #
        # Clock description
        #
        productDescription ;;
        revisionData ;;
        manufacturerIdentity 00:00:00
        userDescription ;
        timeSource 0x20
  recommend:
    - match:
      - nodeLabel: node-role.kubernetes.io/$mcp
      priority: 4
      profile: grandmaster
